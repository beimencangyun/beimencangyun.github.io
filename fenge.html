<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音频分割 · 保留原始参数 (FFmpeg.wasm)</title>
    <style>
        /* 极简样式，仅保证可读 */
        body { font-family: system-ui, sans-serif; margin: 20px; background: #fff; color: #111; }
        .container { max-width: 760px; margin: 0 auto; }
        label, button, input, .status, .download-area { display: block; margin: 14px 0; }
        input[type="file"] { width: 100%; }
        .split-input { font-family: monospace; width: 220px; padding: 4px; }
        button { padding: 8px 16px; font-size: 1rem; cursor: pointer; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .status { background: #f4f4f4; padding: 10px 14px; border: 1px solid #ccc; min-height: 2.8em; word-break: break-word; }
        .download-area a { display: inline-block; margin-right: 22px; margin-bottom: 8px; }
        .error-hint { color: #b00; background: #fee; padding: 8px; border-left: 3px solid #b00; margin: 12px 0; }
        .info-note { color: #444; font-size: 0.9rem; }
        code { background: #eee; padding: 2px 4px; }
        hr { margin: 22px 0; border: 0.5px solid #ddd; }
    </style>
    <!-- 使用官方 FFmpeg.wasm 0.12.10 (UMD) -->
    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.10/dist/umd/ffmpeg.min.js"></script>
</head>
<body>
<div class="container">
    <h2>✂️ 音频分割 (流复制 · 无损参数)</h2>
    <p class="info-note">✔ 基于 FFmpeg.wasm，所有处理在本地完成，不上传。<br>
    ✔ 使用 <code>-c copy</code> 保持原始码率/采样率/声道。<br>
    ⚠️ 必须通过 <code>http://localhost</code> 或 HTTPS 访问，否则 SharedArrayBuffer 不可用。</p>

    <div id="ffmpegStatus" class="status">⏳ 正在初始化 FFmpeg 核心 (首次加载约30MB)……</div>
    <button id="retryLoadBtn" style="display: none; background: #f0f0f0;">🔄 重新加载 FFmpeg</button>

    <label>📁 选择音频文件：</label>
    <input type="file" id="audioFileInput" accept="audio/*">

    <label>⏱️ 分割时长 (支持 HH:MM:SS 或秒数)：</label>
    <input type="text" id="segmentDuration" class="split-input" value="00:05:00" placeholder="例如 00:05:00 或 300">

    <button id="splitBtn" disabled>⏸️ 等待 FFmpeg 就绪</button>

    <div class="download-area" id="downloadLinks">
        <strong>📦 分割结果：</strong><br>
    </div>

    <hr>
    <div id="diagnosticBox" class="info-note"></div>
</div>

<script>
    (function(){
        "use strict";

        // ---------- DOM ----------
        const ffmpegStatusDiv = document.getElementById('ffmpegStatus');
        const retryLoadBtn = document.getElementById('retryLoadBtn');
        const fileInput = document.getElementById('audioFileInput');
        const durationInput = document.getElementById('segmentDuration');
        const splitBtn = document.getElementById('splitBtn');
        const downloadDiv = document.getElementById('downloadLinks');
        const diagnosticBox = document.getElementById('diagnosticBox');

        let ffmpeg = null;
        let ffmpegLoaded = false;
        let isProcessing = false;
        let currentAudioFile = null;

        // 辅助函数
        function setFFmpegStatus(text, isError = false) {
            ffmpegStatusDiv.textContent = text;
            ffmpegStatusDiv.style.background = isError ? '#fee' : '#f4f4f4';
            ffmpegStatusDiv.style.borderColor = isError ? '#e0a0a0' : '#ccc';
        }

        function setDiagnostics(info) {
            diagnosticBox.innerHTML = info;
        }

        function clearDownloadLinks() {
            downloadDiv.innerHTML = '<strong>📦 分割结果：</strong><br>';
        }

        function addDownloadLink(blob, fileName) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = fileName;
            a.textContent = `⬇️ ${fileName}`;
            a.style.marginRight = '18px';
            downloadDiv.appendChild(a);
        }

        // 解析时长
        function parseDurationToSeconds(val) {
            const str = val.trim();
            if (!str) return NaN;
            if (/^\d+(\.\d+)?$/.test(str)) return parseFloat(str);
            const parts = str.split(':').map(p => p.trim());
            if (parts.length === 2) {
                const m = parseInt(parts[0], 10);
                const s = parseFloat(parts[1]);
                return (isNaN(m)||isNaN(s)) ? NaN : m*60 + s;
            } else if (parts.length === 3) {
                const h = parseInt(parts[0], 10);
                const m = parseInt(parts[1], 10);
                const s = parseFloat(parts[2]);
                return (isNaN(h)||isNaN(m)||isNaN(s)) ? NaN : h*3600 + m*60 + s;
            }
            return NaN;
        }

        // 获取音频时长（浏览器辅助，非必须）
        async function getAudioDurationViaElement(file) {
            return new Promise((resolve) => {
                const audio = new Audio();
                const url = URL.createObjectURL(file);
                audio.src = url;
                audio.addEventListener('loadedmetadata', () => {
                    URL.revokeObjectURL(url);
                    resolve(audio.duration);
                });
                audio.addEventListener('error', () => {
                    URL.revokeObjectURL(url);
                    resolve(0);
                });
                audio.load();
                setTimeout(() => { URL.revokeObjectURL(url); resolve(0); }, 5000);
            });
        }

        // ---------- 初始化 FFmpeg (核心) ----------
        async function loadFFmpeg() {
            try {
                setFFmpegStatus('🔄 正在下载 FFmpeg 核心 (约30MB)，请耐心等待……', false);
                retryLoadBtn.style.display = 'none';
                
                // 使用全局 FFmpeg 构造函数 (来自 UMD)
                const { FFmpeg } = FFmpegWASM;
                ffmpeg = new FFmpeg();
                
                // 日志回调 (可用于调试，但为了简洁不打印过多)
                ffmpeg.on('log', ({ message }) => {
                    // 可打开注释查看详细日志
                    // console.log('[ffmpeg]', message);
                });
                
                // 加载核心 (指定官方稳定 CDN)
                await ffmpeg.load({
                    coreURL: 'https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.6/dist/umd/ffmpeg-core.js',
                });
                
                ffmpegLoaded = true;
                setFFmpegStatus('✅ FFmpeg 已就绪。请选择音频文件并设置分割时长。');
                splitBtn.disabled = false;
                splitBtn.textContent = '✂️ 开始分割';
                setDiagnostics('✔ FFmpeg 核心加载成功。环境支持 SharedArrayBuffer。');
            } catch (err) {
                console.error('FFmpeg 加载失败:', err);
                ffmpegLoaded = false;
                let errorMsg = err.message || '未知错误';
                setFFmpegStatus(`❌ FFmpeg 初始化失败: ${errorMsg}`, true);
                retryLoadBtn.style.display = 'inline-block';
                splitBtn.disabled = true;
                splitBtn.textContent = 'FFmpeg 不可用';
                
                // 详细诊断信息
                let diag = `❌ 加载失败。可能原因：<br>`;
                if (!window.isSecureContext) {
                    diag += `⚠️ 当前页面不是安全上下文 (非 HTTPS / localhost)。FFmpeg.wasm 需要 SharedArrayBuffer，必须使用 <code>https://</code> 或 <code>http://localhost</code> 访问。<br>`;
                } else {
                    diag += `✔ 安全上下文: 是。<br>`;
                }
                diag += `🛜 请检查网络是否能访问 CDN (jsdelivr.net)。如被屏蔽，可尝试科学上网或更换网络。<br>`;
                diag += `📌 错误详情: ${errorMsg}`;
                setDiagnostics(diag);
            }
        }

        // 重试加载
        retryLoadBtn.addEventListener('click', () => {
            loadFFmpeg();
        });

        // 页面启动即加载
        loadFFmpeg();

        // 检查安全上下文并提示
        if (!window.isSecureContext) {
            setDiagnostics('⚠️ 当前页面非安全上下文，FFmpeg 将无法运行。请通过 localhost 或 HTTPS 打开。');
        }

        // 文件选择：显示时长信息（辅助）
        fileInput.addEventListener('change', async (e) => {
            const file = fileInput.files[0];
            if (!file) {
                currentAudioFile = null;
                return;
            }
            currentAudioFile = file;
            const dur = await getAudioDurationViaElement(file);
            if (dur > 0) {
                const h = Math.floor(dur / 3600);
                const m = Math.floor((dur % 3600) / 60);
                const s = (dur % 60).toFixed(2);
                setDiagnostics(`📁 已选择: ${file.name} | 时长约 ${h}:${m.toString().padStart(2,'0')}:${s.padStart(5,'0')} (仅供参考)`);
            } else {
                setDiagnostics(`📁 已选择: ${file.name} | 无法通过浏览器读取时长，但分割仍可正常进行。`);
            }
        });

        // ---------- 分割按钮逻辑 (使用 segment muxer) ----------
        splitBtn.addEventListener('click', async () => {
            if (!ffmpegLoaded || !ffmpeg) {
                setFFmpegStatus('❌ FFmpeg 未就绪，无法分割。', true);
                return;
            }
            if (isProcessing) {
                setFFmpegStatus('⏳ 正在处理中，请稍候……', false);
                return;
            }
            const file = currentAudioFile;
            if (!file) {
                setFFmpegStatus('❌ 请先选择一个音频文件。', true);
                return;
            }

            const segStr = durationInput.value.trim();
            const segmentSec = parseDurationToSeconds(segStr);
            if (isNaN(segmentSec) || segmentSec <= 0) {
                setFFmpegStatus('❌ 分割时长无效，请输入正数秒或 HH:MM:SS', true);
                return;
            }

            clearDownloadLinks();
            isProcessing = true;
            splitBtn.disabled = true;
            splitBtn.textContent = '⏳ 处理中...';
            setFFmpegStatus('📤 读取音频文件并写入虚拟文件系统……', false);

            const originalName = file.name;
            const baseName = originalName.replace(/\.[^/.]+$/, "");
            const extMatch = originalName.match(/\.([^/.]+)$/);
            const ext = extMatch ? extMatch[1] : 'mp3';
            const inputFileName = `input_${Date.now()}.${ext}`;

            try {
                const fileData = await file.arrayBuffer();
                await ffmpeg.writeFile(inputFileName, new Uint8Array(fileData));
                
                setFFmpegStatus(`⚙️ 开始流复制分段 (segment_time=${segmentSec}s) ……`, false);
                
                const outputPattern = `part_%03d.${ext}`;
                
                // 使用 segment muxer 一次命令完成分割，保留全部参数
                await ffmpeg.exec([
                    '-i', inputFileName,
                    '-map', '0:a',
                    '-c', 'copy',                // 流复制，无损
                    '-f', 'segment',
                    '-segment_time', segmentSec.toString(),
                    '-reset_timestamps', '1',
                    outputPattern
                ]);
                
                setFFmpegStatus('📦 分段完成，读取生成的文件……', false);
                
                const files = await ffmpeg.listDir('/');
                const partFiles = files.filter(f => f.name.startsWith('part_') && f.name.endsWith(`.${ext}`) && !f.isDir);
                
                if (partFiles.length === 0) {
                    throw new Error('未生成任何分段，可能音频太短或格式不支持');
                }
                
                partFiles.sort((a,b) => a.name.localeCompare(b.name));
                
                for (let i=0; i<partFiles.length; i++) {
                    const pf = partFiles[i];
                    const data = await ffmpeg.readFile(pf.name);
                    const blob = new Blob([data.buffer], { type: file.type || 'audio/mpeg' });
                    const downName = `${baseName}_part${i+1}.${ext}`;
                    addDownloadLink(blob, downName);
                }
                
                setFFmpegStatus(`✅ 分割完成！共 ${partFiles.length} 个片段。`, false);
                
                // 清理虚拟文件
                await ffmpeg.deleteFile(inputFileName);
                for (const pf of partFiles) await ffmpeg.deleteFile(pf.name);
                
            } catch (err) {
                console.error(err);
                setFFmpegStatus(`❌ 分割出错: ${err.message}`, true);
                try { await ffmpeg.deleteFile(inputFileName); } catch(e){}
            } finally {
                isProcessing = false;
                splitBtn.disabled = false;
                splitBtn.textContent = '✂️ 开始分割';
            }
        });

        // 附加说明：如果SharedArrayBuffer未启用，FFmpeg会失败。提醒用户使用本地服务器。
        if (!window.crossOriginIsolated) {
            setDiagnostics(prev => prev + '<br>⚠️ 当前未启用跨域隔离 (crossOriginIsolated=false)，可能导致 SharedArrayBuffer 不可用。请确保服务器配置了相应头部，或使用 localhost。');
        }
    })();
</script>
</body>
</html>
